services:
  qdrant:
    image: qdrant/qdrant:latest
    container_name: qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    container_name: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./../../infra/deploy/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-agents_db}
      POSTGRES_USER: ${POSTGRES_USER:-agents}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-this-password}
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-agents} -d ${POSTGRES_DB:-agents_db}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  agents-api:
    image: ${AGENTS_IMAGE:-ghcr.io/seydinabane/dev-senior:latest}
    container_name: agents-api
    ports:
      - "${PORT:-8080}:${PORT:-8080}"
    environment:
      PORT: ${PORT:-8080}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:?err}
      OPENROUTER_BASE_URL: ${OPENROUTER_BASE_URL:-https://openrouter.ai/api/v1}
      AGENTS_API_KEY: ${AGENTS_API_KEY:-}
      DATABASE_URL: ${DATABASE_URL:-postgresql://agents:change-this-password@postgres:5432/agents_db}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      QDRANT_HOST: qdrant
      QDRANT_PORT: 6333
      EMBED_MODEL: ${EMBED_MODEL:-openai/text-embedding-3-small}
      SESSION_TTL_SECONDS: ${SESSION_TTL_SECONDS:-3600}
      LANGFUSE_PUBLIC_KEY: ${LANGFUSE_PUBLIC_KEY:-}
      LANGFUSE_SECRET_KEY: ${LANGFUSE_SECRET_KEY:-}
      LANGFUSE_HOST: ${LANGFUSE_HOST:-https://cloud.langfuse.com}
      DOCS_ENABLED: ${DOCS_ENABLED:-true}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:5173,http://localhost:5678,http://localhost:3000}
      SLACK_SIGNING_SECRET: ${SLACK_SIGNING_SECRET:-}
      TEAMS_WEBHOOK_KEY: ${TEAMS_WEBHOOK_KEY:-}
      GITHUB_TOKEN: ${GITHUB_TOKEN:-}
      GOOGLE_CREDENTIALS_FILE: ${GOOGLE_CREDENTIALS_FILE:-}
      CRM_API_KEY: ${CRM_API_KEY:-}
      SEARCH_CONSOLE_SITE_URL: ${SEARCH_CONSOLE_SITE_URL:-}
      DATAFORSEO_LOGIN: ${DATAFORSEO_LOGIN:-}
      DATAFORSEO_PASSWORD: ${DATAFORSEO_PASSWORD:-}
      DEV_SENIOR_MODEL: ${DEV_SENIOR_MODEL:-qwen/qwen-2.5-coder-7b-instruct}
      BIZ_MANAGER_MODEL: ${BIZ_MANAGER_MODEL:-meta-llama/llama-3.1-8b-instruct}
    depends_on:
      qdrant:
        condition: service_started
      postgres:
        condition: service_healthy
    restart: unless-stopped

  n8n:
    image: n8nio/n8n:latest
    container_name: n8n
    ports:
      - "5678:5678"
    volumes:
      - n8n_data:/home/node/.n8n
      - ./../../workflows/n8n:/workflows
    restart: unless-stopped
    environment:
      - N8N_BASIC_AUTH_ACTIVE=true
      - N8N_BASIC_AUTH_USER=${N8N_USER:-admin}
      - N8N_BASIC_AUTH_PASSWORD=${N8N_PASSWORD:-changeme}
      - N8N_HOST=localhost
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - WEBHOOK_URL=http://localhost:5678/
      - AGENTS_API_URL=${AGENTS_API_URL:-http://agents-api:8080}
    depends_on:
      agents-api:
        condition: service_started

volumes:
  qdrant_data:
  postgres_data:
  redis_data:
  n8n_data:
