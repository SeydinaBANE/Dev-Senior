name: Deploy

on:
  push:
    branches: [main]
    paths-ignore:
      - "docs/**"
      - "*.md"
      - "workflows/n8n/**"

  workflow_dispatch:
    inputs:
      environment:
        description: "Environnement cible"
        required: true
        default: "production"
        type: choice
        options: [production, staging]

jobs:
  deploy:
    name: Déployer sur Mac mini M4
    runs-on: self-hosted
    environment: production
    concurrency:
      group: deploy-production
      cancel-in-progress: false

    steps:
      - uses: actions/checkout@v4

      - name: Vérifier que les tests passent
        run: make check

      - name: Lowercase image name
        id: image
        env:
          REPO: ${{ github.repository }}
        run: echo "name=ghcr.io/${REPO@L}" >> $GITHUB_OUTPUT

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull latest Docker image
        env:
          AGENTS_IMAGE: ${{ steps.image.outputs.name }}:latest
        run: |
          echo "Pulling ${AGENTS_IMAGE}..."
          for i in $(seq 1 5); do
            docker compose -f infra/docker/docker-compose.yml pull agents-api && break
            echo "Attempt $i failed, waiting 30s for build to complete..."
            sleep 30
          done

      - name: Indexer la codebase (mémoire Dev Senior)
        run: make index-codebase
        continue-on-error: true

      - name: Redémarrer l'API agents
        run: |
          docker compose -f infra/docker/docker-compose.yml up -d agents-api

      - name: Health check post-déploiement
        run: |
          echo "Waiting for agents-api to be healthy..."
          for i in $(seq 1 10); do
            sleep 5
            docker compose -f infra/docker/docker-compose.yml exec -T agents-api \
              curl -sf http://localhost:${PORT:-8080}/dev-senior/health > /dev/null 2>&1 \
              && echo "agents-api is healthy" && exit 0
          done
          echo "Health check failed"
          docker compose -f infra/docker/docker-compose.yml logs agents-api --tail=20
          exit 1

      - name: Notifier en cas d'échec
        if: failure()
        run: |
          echo "::error::Déploiement échoué — logs ci-dessus"
