name: CI

on:
  push:
    branches: [main, develop, feat/**]
  pull_request:
    branches: [main]

jobs:
  quality:
    name: Lint & Types
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Installer les dépendances
        run: pip install -e ".[dev]"

      - name: Lint (ruff)
        run: ruff check .

      - name: Format (ruff)
        run: ruff format --check .

      - name: Types (mypy)
        run: mypy agents/ memory/ports.py memory/adapters/ --ignore-missing-imports

  tests:
    name: Tests
    runs-on: ubuntu-latest
    needs: quality
    env:
      # Variables factices pour que le code s'initialise sans vraie API
      OPENROUTER_API_KEY: test-key-ci
      OPENROUTER_BASE_URL: https://openrouter.ai/api/v1
      AGENTS_API_KEY: ci-test-api-key
      GITHUB_TOKEN: test-token
      QDRANT_HOST: localhost
      QDRANT_PORT: "6333"
      DATABASE_URL: postgresql://agents:agents@localhost:5432/agents_db
      LANGFUSE_PUBLIC_KEY: ""
      LANGFUSE_SECRET_KEY: ""

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Installer les dépendances
        run: pip install -e ".[dev]"

      - name: Tests
        run: pytest tests/ -v --tb=short

      - name: Upload résultats
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: .pytest_cache/

  security:
    name: Sécurité
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Vérifier l'absence de secrets
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          extra_args: --only-verified
